<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Escolar Técnica 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --v-oscuro: #1a4731; --v-medio: #2d6a4f; --v-claro: #52b788; --v-menta: #d8f3dc;
            --blanco: #f8fffe; --gris: #f0f4f2; --magenta: #d946ef; --naranja: #e07b39;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Source Sans 3', sans-serif; background: var(--gris); color: #1c2b24; }
        h1, h2, h3 { font-family: 'Oswald', sans-serif; text-transform: uppercase; }

        /* HEADER */
        .header { background: linear-gradient(135deg, var(--v-oscuro), var(--v-medio)); color: white; padding: 20px; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .header-content { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .btn-nuevo { background: var(--v-claro); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-nuevo:hover { background: #63cf9d; transform: translateY(-2px); }

        /* LAYOUT */
        .container { max-width: 1200px; margin: 20px auto; display: grid; grid-template-columns: 300px 1fr; gap: 20px; padding: 0 20px; }
        .sidebar { display: flex; flex-direction: column; gap: 20px; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); padding: 20px; }
        .card h3 { color: var(--v-oscuro); border-bottom: 2px solid var(--v-menta); margin-bottom: 15px; font-size: 1rem; }

        /* CALENDARIO */
        .cal-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: #ddd; border-radius: 12px; overflow: hidden; border: 1px solid #ddd; }
        .cal-day-name { background: var(--v-oscuro); color: white; text-align: center; padding: 10px; font-size: 0.7rem; font-weight: bold; }
        .cal-day { background: white; min-height: 110px; padding: 10px; position: relative; cursor: pointer; transition: 0.2s; }
        .cal-day:hover { background: #f0faf5; }
        .cal-day.today { background: #fef3c7; border: 2px solid #fbbf24; }
        .cal-day.feriado { background: #fdf0ec; }
        .cal-day.receso { background: #e8f4fd; }
        .cal-day.bimestre { border-bottom: 5px solid var(--magenta); }
        .dia-num { font-family: 'Oswald', sans-serif; font-size: 1rem; color: #666; }
        .event-chip { font-size: 0.65rem; background: var(--v-medio); color: white; padding: 2px 4px; border-radius: 4px; margin-top: 2px; overflow: hidden; white-space: nowrap; }

        /* MODAL */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .modal.visible { display: flex; }
        .modal-box { background: white; width: 95%; max-width: 600px; border-radius: 20px; overflow: hidden; max-height: 90vh; overflow-y: auto; }
        .modal-header { background: var(--v-oscuro); color: white; padding: 20px; display: flex; justify-content: space-between; }
        .form-body { padding: 25px; display: flex; flex-direction: column; gap: 15px; }
        label { font-size: 0.75rem; font-weight: bold; color: #666; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-family: inherit; }
        .alert-conflict { background: #fff5f5; border: 1px solid #feb2b2; color: #c53030; padding: 10px; border-radius: 8px; display: none; font-size: 0.8rem; }

        @media (max-width: 800px) { .container { grid-template-columns: 1fr; } .sidebar { display: none; } }
    </style>
</head>
<body>

<header class="header">
    <div class="header-content">
        <div>
            <h1>Agenda Técnica N°4</h1>
            <p style="font-size: 0.8rem; opacity: 0.8;">Gestión Institucional Ciclo 2026</p>
        </div>
        <button class="btn-nuevo" onclick="abrirForm()">➕ NUEVO EVENTO</button>
    </div>
</header>

<div class="container">
    <aside class="sidebar">
        <div class="card">
            <h3>📅 Referencias</h3>
            <ul style="list-style: none; font-size: 0.8rem; line-height: 2;">
                <li><span style="color:var(--magenta)">▬</span> Cierre de Bimestre</li>
                <li><span style="color:#c1440e">●</span> Feriado Nacional</li>
                <li><span style="color:#1a5f8a">●</span> Receso Escolar</li>
                <li><span style="color:var(--v-medio)">●</span> Actividad Reservada</li>
            </ul>
        </div>
        <div class="card">
            <h3>📋 Hitos del Mes</h3>
            <div id="hitos-lista" style="font-size: 0.75rem; color: #555;"></div>
        </div>
    </aside>

    <main>
        <div class="cal-nav">
            <button onclick="cambiarMes(-1)" style="padding: 10px; border: none; background: var(--v-menta); border-radius: 8px; cursor: pointer;">◀</button>
            <h2 id="mes-titulo">Abril 2026</h2>
            <button onclick="cambiarMes(1)" style="padding: 10px; border: none; background: var(--v-menta); border-radius: 8px; cursor: pointer;">▶</button>
        </div>
        <div class="cal-grid" id="grid">
            </div>
    </main>
</div>

<div id="modal" class="modal">
    <div class="modal-box">
        <div class="modal-header">
            <h2 id="modal-fecha-txt">NUEVA ACTIVIDAD</h2>
            <button onclick="cerrarForm()" style="background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer;">&times;</button>
        </div>
        <form id="agendaForm" class="form-body">
            <div id="conflict-msg" class="alert-conflict">⚠️ Ya existe una reserva para este curso en este horario.</div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div>
                    <label>Fecha</label>
                    <input type="date" id="fFecha" required onchange="verificarConflictos()">
                </div>
                <div>
                    <label>Horario</label>
                    <select id="fHora" onchange="verificarConflictos()"></select>
                </div>
            </div>

            <div>
                <label>Responsable (Docente/DOE/Directivo)</label>
                <input type="text" id="fNombre" placeholder="Nombre y Apellido" required>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div>
                    <label>Año</label>
                    <select id="fAnio" onchange="verificarConflictos()">
                        <option value="">Seleccionar...</option>
                        <option>1°</option><option>2°</option><option>3°</option><option>4°</option><option>5°</option><option>6°</option>
                    </select>
                </div>
                <div>
                    <label>División</label>
                    <select id="fDiv" onchange="verificarConflictos()">
                        <option value="">Seleccionar...</option>
                        <option>1ª</option><option>2ª</option><option>3ª</option><option>4ª</option><option>5ª</option><option>6ª</option>
                    </select>
                </div>
            </div>

            <div>
                <label>Materia / Proyecto</label>
                <input type="text" id="fMateria" placeholder="Nombre de la materia">
            </div>

            <div>
                <label>Observaciones</label>
                <textarea id="fObs" rows="3"></textarea>
            </div>

            <button type="submit" id="btnGuardar" style="background: var(--v-oscuro); color: white; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">💾 GUARDAR ACTIVIDAD</button>
        </form>
    </div>
</div>

<script>
    const WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbxck7r1H7lTend8UC6VExgCXwdLh1PTzpFi0ZiDeGS8otQPxb0nXXZRrWgcTTe0-BY9/exec';
    let mesActual = new Date(2026, 3, 1);
    let eventos = [];

    // Feriados y Hitos
    const feriados = {'2026-04-02': 'Malvinas', '2026-04-03': 'Viernes Santo', '2026-05-01': 'Trabajador', '2026-05-25': 'Revolución'};
    const cierres = ['2026-04-30', '2026-07-17', '2026-10-02', '2026-12-03'];

    function poblarHoras() {
        const sel = document.getElementById('fHora');
        for(let h=7; h<=22; h++) {
            for(let m=0; m<60; m+=5) {
                let t = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`;
                sel.innerHTML += `<option value="${t}">${t} hs</option>`;
            }
        }
    }

    async function cargarDatos() {
        try {
            const resp = await fetch(WEBAPP_URL);
            eventos = await resp.json();
            render();
        } catch (e) { console.error("Error al cargar", e); render(); }
    }

    function render() {
        const grid = document.getElementById('grid');
        const tit = document.getElementById('mes-titulo');
        grid.innerHTML = ['DOM','LUN','MAR','MIE','JUE','VIE','SAB'].map(d => `<div class="cal-day-name">${d}</div>`).join('');
        
        tit.innerText = mesActual.toLocaleDateString('es-AR', {month:'long', year:'numeric'}).toUpperCase();
        
        const primerDia = new Date(mesActual.getFullYear(), mesActual.getMonth(), 1).getDay();
        const ultimoDia = new Date(mesActual.getFullYear(), mesActual.getMonth() + 1, 0).getDate();

        for(let i=0; i<primerDia; i++) grid.innerHTML += `<div class="cal-day" style="background:#eee"></div>`;

        for(let d=1; d<=ultimoDia; d++) {
            const fecha = `${mesActual.getFullYear()}-${(mesActual.getMonth()+1).toString().padStart(2,'0')}-${d.toString().padStart(2,'0')}`;
            let clases = "cal-day";
            if(feriados[fecha]) clases += " feriado";
            if(cierres.includes(fecha)) clases += " bimestre";
            
            const evsDia = eventos.filter(e => e.fecha === fecha);
            
            grid.innerHTML += `
                <div class="${clases}" onclick="abrirForm('${fecha}')">
                    <div class="dia-num">${d}</div>
                    ${feriados[fecha] ? `<div style="font-size:0.6rem; color:#c1440e; font-weight:bold">${feriados[fecha]}</div>` : ''}
                    <div class="ev-cont">
                        ${evsDia.map(e => `<div class="event-chip">${e.hora} ${e.anio}°${e.division}</div>`).join('')}
                    </div>
                </div>`;
        }
    }

    function verificarConflictos() {
        const f = document.getElementById('fFecha').value;
        const h = document.getElementById('fHora').value;
        const a = document.getElementById('fAnio').value;
        const d = document.getElementById('fDiv').value;
        const con = eventos.some(e => e.fecha === f && e.hora === h && e.anio === a && e.division === d);
        document.getElementById('conflict-msg').style.display = con ? 'block' : 'none';
        document.getElementById('btnGuardar').disabled = con;
    }

    document.getElementById('agendaForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnGuardar');
        btn.innerText = "⏳ GUARDANDO...";
        const data = {
            fecha: document.getElementById('fFecha').value,
            hora: document.getElementById('fHora').value,
            nombres: document.getElementById('fNombre').value,
            anio: document.getElementById('fAnio').value,
            division: document.getElementById('fDiv').value,
            materia: document.getElementById('fMateria').value,
            observaciones: document.getElementById('fObs').value
        };
        await fetch(WEBAPP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
        alert("¡Actividad guardada!");
        location.reload();
    };

    function abrirForm(f) { 
        if(f) document.getElementById('fFecha').value = f;
        document.getElementById('modal').classList.add('visible'); 
    }
    function cerrarForm() { document.getElementById('modal').classList.remove('visible'); }
    function cambiarMes(dir) { mesActual.setMonth(mesActual.getMonth() + dir); render(); }

    poblarHoras();
    cargarDatos();
</script>
</body>
</html>
