<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Escolar Técnica 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Source Sans 3', sans-serif; background-color: #f0f4f0; }
        h1, h2, h3 { font-family: 'Oswald', sans-serif; }
        
        /* EL PARCHE MAESTRO PARA CHANY */
        .modal-scroll {
            max-height: 80vh !important;
            overflow-y: auto !important;
            padding-right: 10px;
        }
        .form-section {
            display: flex !important;
            flex-direction: column !important;
            gap: 12px !important;
            margin-bottom: 20px !important;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 15px;
        }
        input, select, textarea {
            min-height: 44px !important;
            border: 1.5px solid #2d5a27 !important;
            border-radius: 8px !important;
            padding: 8px !important;
            width: 100% !important;
            background-color: white !important;
        }
        label { 
            font-weight: 600 !important; 
            color: #1a3c18 !important;
            font-size: 0.9rem !important;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import React, { useState, useEffect } from 'https://esm.sh/react@18.2.0';
        import ReactDOM from 'https://esm.sh/react-dom@18.2.0/client';

        const G_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxck7r1H7ITend8UC6VExgCXwdLh1PTzpFi0ZiDeGS8otQPxb0nXZZRwGctTeO-BY9/exec';

        function App() {
            const [eventos, setEventos] = useState([]);
            const [showModal, setShowModal] = useState(false);
            const [loading, setLoading] = useState(false);
            const [formData, setFormData] = useState({
                fecha: '', hora: '08:00', participantes: '', nombres: '',
                curso: '1°', division: '1°', area: 'Ciencias Sociales',
                materia: '', categoria: 'Evento', observaciones: ''
            });

            // Cargar datos
            useEffect(() => {
                fetch(G_SCRIPT_URL)
                    .then(res => res.json())
                    .then(data => setEventos(data))
                    .catch(err => console.error("Error cargando:", err));
            }, []);

            const guardarEvento = async (e) => {
                e.preventDefault();
                setLoading(true);
                try {
                    await fetch(G_SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify(formData)
                    });
                    alert("¡Evento guardado con éxito!");
                    setShowModal(false); // ESTO CIERRA EL FORMULARIO
                    window.location.reload(); // Recarga para ver el nuevo evento
                } catch (error) {
                    alert("Error al guardar");
                }
                setLoading(false);
            };

            return React.createElement('div', { className: 'p-4' },
                // Encabezado
                React.createElement('header', { className: 'bg-green-800 text-white p-6 rounded-t-lg shadow-lg mb-4' },
                    React.createElement('h1', { className: 'text-3xl font-bold' }, 'AGENDA ESCOLAR TÉCNICA 2026'),
                    React.createElement('p', { className: 'opacity-80' }, 'Sistema de Gestión Institucional - ET N°4')
                ),

                // Botón Nuevo
                React.createElement('button', { 
                    onClick: () => setShowModal(true),
                    className: 'bg-green-600 hover:bg-green-700 text-white px-6 py-3 rounded-full font-bold shadow-lg mb-6 flex items-center gap-2'
                }, '➕ NUEVO EVENTO'),

                // Lista de eventos simple (para que se vea bien en celular)
                React.createElement('div', { className: 'grid gap-4' },
                    eventos.length === 0 ? 'Cargando agenda...' : 
                    eventos.map((ev, i) => React.createElement('div', { key: i, className: 'bg-white p-4 rounded-lg shadow border-l-4 border-green-500' },
                        React.createElement('p', { className: 'font-bold text-green-900' }, `${ev.fecha} - ${ev.hora}hs`),
                        React.createElement('p', { className: 'text-lg' }, `${ev.categoria}: ${ev.materia || 'General'}`),
                        React.createElement('p', { className: 'text-sm text-gray-600' }, `${ev.curso} ${ev.division} - ${ev.nombres}`)
                    ))
                ),

                // EL MODAL (EL FORMULARIO)
                showModal && React.createElement('div', { className: 'fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50' },
                    React.createElement('div', { className: 'bg-white rounded-xl shadow-2xl w-full max-w-lg p-6' },
                        React.createElement('div', { className: 'flex justify-between items-center mb-4' },
                            React.createElement('h
