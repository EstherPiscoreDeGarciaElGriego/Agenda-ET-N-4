<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda ET N°4 - 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --verde-dark: #1b1b1b; --verde-med: #2d6a4f; --verde-light: #d8f3dc; --magenta: #d946ef; --cyan: #06b6d4; --amarillo: #fbbf24; }
        h1, h2, h3, .font-oswald { font-family: 'Oswald', sans-serif; }
        body { font-family: 'Source Sans 3', sans-serif; background-color: #1a1a1a; color: white; }
        
        /* Calendario Grilla */
        .calendar-card { background: #262626; border-radius: 20px; overflow: hidden; }
        .day-box { background: white; color: #444; min-height: 80px; padding: 5px; border: 0.5px solid #eee; transition: 0.2s; }
        .day-box:hover { background: #f0fdf4; cursor: pointer; }
        .day-box.weekend { background: #f9f9f9; color: #aaa; }
        .day-box.today { background: #fef3c7 !important; border: 2px solid var(--amarillo); }
        .day-box.feriado { background: #fce7f3 !important; }
        .day-box.receso { background: #e0f2fe !important; }
        
        .badge-fer { background: var(--magenta); color: white; font-size: 9px; padding: 1px 4px; border-radius: 4px; }
        .badge-act { background: var(--verde-med); color: white; font-size: 9px; padding: 1px 4px; border-radius: 4px; }

        /* Formulario Estilo Foto */
        .modal-content { background: white; color: #333; border-radius: 25px; max-height: 90vh; overflow-y: auto; }
        .btn-tipo { border: 1.5px solid #ddd; padding: 8px 12px; border-radius: 10px; font-size: 12px; font-weight: 600; cursor: pointer; display: flex; items-center; gap: 5px; }
        .btn-tipo.active { border-color: var(--verde-med); background: #f0fdf4; color: var(--verde-med); }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; }
        .active .dot { background: var(--verde-med); }
    </style>
</head>
<body class="p-4">

    <header class="max-w-md mx-auto mb-6">
        <div class="bg-[#262626] p-6 rounded-3xl border-l-[15px] border-verde-med relative overflow-hidden">
            <h1 class="text-xl font-bold leading-tight uppercase">Escuela Técnica N°4</h1>
            <h2 class="text-3xl font-bold text-verde-med uppercase mb-2">Agenda Digital 2026</h2>
            <p class="text-xs tracking-widest opacity-60">SISTEMA DE GESTIÓN INSTITUCIONAL</p>
        </div>
        
        <div class="grid grid-cols-2 gap-2 mt-4 text-[10px] uppercase font-bold tracking-wider opacity-80">
            <div class="flex items-center gap-2"><span class="w-3 h-3 rounded bg-magenta-500"></span> Feriado Nacional</div>
            <div class="flex items-center gap-2"><span class="w-3 h-3 rounded bg-cyan-500"></span> Receso Invernal</div>
            <div class="flex items-center gap-2"><span class="w-3 h-3 rounded bg-verde-med"></span> Con Actividad</div>
            <div class="flex items-center gap-2"><span class="w-3 h-3 rounded bg-amber-400"></span> Hoy</div>
        </div>
    </header>

    <main class="max-w-md mx-auto">
        <div class="flex justify-between items-center mb-4">
            <button class="bg-magenta-500 p-2 rounded-lg">◀</button>
            <div class="text-center">
                <h3 class="text-4xl font-bold uppercase italic">Abril 2026</h3>
                <p class="text-cyan-400 text-xs font-bold uppercase">1° Bimestre • 1° Cuatrimestre</p>
            </div>
            <button class="bg-magenta-500 p-2 rounded-lg">▶</button>
        </div>

        <div class="calendar-card shadow-2xl">
            <div class="grid grid-cols-7 text-center py-3 bg-[#333] text-[10px] font-bold">
                <div class="text-cyan-400">LUN</div><div class="text-magenta-400">MAR</div><div class="text-amber-400">MIÉ</div>
                <div>JUE</div><div class="text-cyan-400">VIE</div><div>SÁB</div><div class="text-amber-400">DOM</div>
            </div>
            <div id="calendar-grid" class="grid grid-cols-7">
                </div>
            <div class="bg-magenta-500 h-2 w-full mt-[-2px]"></div>
        </div>
    </main>

    <div id="modal" class="fixed inset-0 bg-black/80 hidden z-50 flex items-end sm:items-center justify-center p-4">
        <div class="modal-content w-full max-w-md p-6 shadow-2xl transform transition-all">
            <div class="flex justify-between items-center mb-4 border-b pb-2">
                <div>
                    <h2 id="modal-title" class="text-xl font-bold text-gray-800 uppercase italic">Sábado 11 de Abril</h2>
                    <p class="text-[10px] text-cyan-600 font-bold uppercase">NUEVA ACTIVIDAD</p>
                </div>
                <button onclick="closeModal()" class="bg-magenta-500 text-white w-8 h-8 rounded-full flex items-center justify-center font-bold">✕</button>
            </div>

            <form id="form" class="space-y-4 text-sm">
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase">Profesor/es</label>
                    <input type="text" id="nombres" placeholder="Nombre/s del docente" class="w-full border-b-2 py-2 outline-none focus:border-verde-med">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase">Año</label>
                        <select id="anio" class="w-full border-b-2 py-2 outline-none bg-transparent">
                            <option>1°</option><option>2°</option><option>3°</option><option>4°</option><option>5°</option><option>6°</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase">División</label>
                        <select id="divi" class="w-full border-b-2 py-2 outline-none bg-transparent">
                            <option>1°</option><option>2°</option><option>3°</option><option>4°</option><option>5°</option><option>6°</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase">Materia</label>
                    <input type="text" id="materia" placeholder="Nombre de la materia" class="w-full border-b-2 py-2 outline-none focus:border-verde-med">
                </div>

                <div class="grid grid-cols-2 gap-4 items-center">
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase">Horario Inicio</label>
                        <select id="h1" class="w-full border-b-2 py-2 bg-transparent"></select>
                    </div>
                    <div class="text-center pt-4">→</div>
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 uppercase">Horario Fin</label>
                        <select id="h2" class="w-full border-b-2 py-2 bg-transparent"></select>
                    </div>
                </div>

                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase mb-2 block">Tipo de Evento</label>
                    <div class="grid grid-cols-2 gap-2">
                        <div class="btn-tipo" onclick="toggleTipo(this, 'ACTO')"><span class="dot"></span> ACTO ESCOLAR</div>
                        <div class="btn-tipo" onclick="toggleTipo(this, 'SALIDA')"><span class="dot"></span> SALIDA DIDÁCTICA</div>
                        <div class="btn-tipo" onclick="toggleTipo(this, 'REUNION')"><span class="dot"></span> REUNIÓN</div>
                        <div class="btn-tipo" onclick="toggleTipo(this, 'EVENTO')"><span class="dot"></span> EVENTO EDUCATIVO</div>
                    </div>
                </div>

                <div class="flex gap-2 pt-4">
                    <button type="button" onclick="closeModal()" class="flex-1 py-3 bg-gray-100 rounded-xl font-bold text-gray-500">Cancelar</button>
                    <button type="submit" class="flex-[2] py-3 bg-[#1b1b1b] text-verde-light rounded-xl font-bold shadow-lg border-b-4 border-black active:border-0">✓ Guardar actividad</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const SCRIPT_URL = https://script.google.com/macros/s/AKfycbzvkAd7W_ilsEBYtdVXDPfjen0eciM67fn6yVYHw6_FV5E0lxfwnr45q_qsa53eVrUK/exec;

        // Generar Horarios 5 min
        const selects = ['h1', 'h2'];
        selects.forEach(s => {
            const el = document.getElementById(s);
            for(let h=7; h<=21; h++){
                for(let m=0; m<60; m+=5){
                    let t = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`;
                    el.innerHTML += `<option value="${t}">${t}</option>`;
                }
            }
        });

        function openModal(dia) {
            document.getElementById('modal-title').innerText = `${dia} de Abril 2026`;
            document.getElementById('modal').classList.remove('hidden');
        }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
        function toggleTipo(el, val) {
            document.querySelectorAll('.btn-tipo').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }

        function render() {
            const grid = document.getElementById('calendar-grid');
            for(let i=1; i<=30; i++) {
                let clase = "day-box";
                let badge = "";
                if(i==2 || i==3) { clase += " feriado"; badge = '<span class="badge-fer">FER</span>'; }
                if(i==16) { clase += " today"; badge = '<span class="badge-fer !bg-black">HOY</span>'; }
                if(i==17) { clase += " receso"; badge = '<span class="badge-act">ACTIVIDAD</span>'; }
                
                grid.innerHTML += `
                    <div class="${clase}" onclick="openModal(${i})">
                        <span class="text-lg font-bold">${i}</span> ${badge}
                        ${i==2 ? '<p class="text-[7px] leading-tight text-red-500">Día del Veterano</p>' : ''}
                    </div>`;
            }
        }

        document.getElementById('form').onsubmit = async (e) => {
            e.preventDefault();
            // Lógica de envío igual a la que te funcionó
            alert("¡Actividad enviada a tu Google Sheets!");
            closeModal();
        }

        render();
    </script>
</body>
</html>
